version: '3.8'services:  backend:    build:      context: .      dockerfile: Dockerfile    container_name: datanotebook-backend    ports:      - "80:8000"    env_file:      - .env    environment:      - PYTHONUNBUFFERED=1    volumes:      - ./backend:/app      - ./backend/uploads:/app/uploads    networks:      - datanotebook-network    restart: unless-stopped    healthcheck:      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]      interval: 30s      timeout: 10s      retries: 3      start_period: 5snetworks:  datanotebook-network:    driver: bridge